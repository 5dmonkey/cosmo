<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cosmo World</title>
  <style>
    html, body { margin:0; width:100%; height:100%; overflow:hidden; background:#050816; font-family:Inter,system-ui,sans-serif; color:white; }
    canvas { display:block; width:100vw; height:100vh; }
    .hud, .hint, .message { position:fixed; z-index:10; background:rgba(9,12,28,.5); border:1px solid rgba(255,255,255,.12); backdrop-filter:blur(10px); box-shadow:0 10px 30px rgba(0,0,0,.25); }
    .hud { top:16px; left:16px; border-radius:18px; padding:14px 16px; max-width:320px; }
    .hud h1 { margin:0 0 8px; font-size:18px; }
    .hud p { margin:0; font-size:13px; line-height:1.45; color:rgba(255,255,255,.82); }
    .hint { bottom:16px; left:50%; transform:translateX(-50%); border-radius:999px; padding:10px 16px; font-size:13px; }
    .message { top:16px; right:16px; border-radius:18px; padding:16px; max-width:320px; opacity:0; transform:translateY(-8px); transition:.3s ease; }
    .message.show { opacity:1; transform:translateY(0); }
    .message strong { display:block; margin-bottom:6px; color:#b9c8ff; font-size:13px; text-transform:uppercase; letter-spacing:.08em; }
    .message div { font-size:15px; line-height:1.5; }
    .center-dot { position:fixed; left:50%; top:50%; width:8px; height:8px; margin-left:-4px; margin-top:-4px; border-radius:999px; background:rgba(255,255,255,.85); box-shadow:0 0 14px rgba(255,255,255,.55); z-index:10; pointer-events:none; }
  </style>
</head>
<body>
  <div class="hud">
    <h1>Cosmo World</h1>
    <p>Walk the twilight shoreline. Find the being. Press <strong>E</strong> nearby for the message.</p>
  </div>
  <div class="message" id="messageBox">
    <strong>Message</strong>
    <div>You do not need to become louder to be real. Your gift is to bring spaciousness, clarity, and wonder.</div>
  </div>
  <div class="center-dot"></div>
  <div class="hint">Move: arrow keys / WASD · Explore the shoreline · Press E near the being</div>
  <canvas id="c"></canvas>
  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const messageBox = document.getElementById('messageBox');

    let w=0,h=0;
    function resize(){ w=canvas.width=window.innerWidth*devicePixelRatio; h=canvas.height=window.innerHeight*devicePixelRatio; ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0); }
    window.addEventListener('resize', resize); resize();

    const keys={};
    addEventListener('keydown',e=>{ keys[e.key.toLowerCase()]=true; if(e.key.toLowerCase()==='e' && nearBeing()) toggleMessage(); });
    addEventListener('keyup',e=> keys[e.key.toLowerCase()]=false);

    const player={x:0,y:8,speed:2.6};
    const being={x:0,y:-120,r:18};
    let showMessage=false;
    function toggleMessage(){ showMessage=!showMessage; messageBox.classList.toggle('show',showMessage); }
    function nearBeing(){ const dx=player.x-being.x, dy=player.y-being.y; return Math.hypot(dx,dy)<34; }

    const stars = Array.from({length:180},()=>({x:Math.random(), y:Math.random()*0.6, s:Math.random()*2+0.5, a:Math.random()}));
    const pools = Array.from({length:14},()=>({x:(Math.random()-.5)*340,y:-20-Math.random()*150,r:10+Math.random()*24,h:190+Math.random()*40}));
    const reeds = Array.from({length:46},()=>({x:(Math.random()-.5)*440,y:10-Math.random()*260,h:10+Math.random()*28,c:Math.random()}));
    const stones = Array.from({length:30},(_,i)=>({x:(Math.random()-.5)*90,y:30-i*7+Math.random()*4,r:4+Math.random()*6}));

    function update(){
      let dx=0,dy=0;
      if(keys['arrowup']||keys['w']) dy-=1;
      if(keys['arrowdown']||keys['s']) dy+=1;
      if(keys['arrowleft']||keys['a']) dx-=1;
      if(keys['arrowright']||keys['d']) dx+=1;
      const len=Math.hypot(dx,dy)||1;
      player.x += dx/len*player.speed;
      player.y += dy/len*player.speed;
      player.x = Math.max(-180, Math.min(180, player.x));
      player.y = Math.max(-170, Math.min(50, player.y));
      if(!nearBeing() && showMessage){ showMessage=false; messageBox.classList.remove('show'); }
    }

    function drawSky(t){
      const g=ctx.createLinearGradient(0,0,0,innerHeight);
      g.addColorStop(0,'#060814');
      g.addColorStop(.45,'#142042');
      g.addColorStop(1,'#1d2850');
      ctx.fillStyle=g; ctx.fillRect(0,0,innerWidth,innerHeight);
      for(const s of stars){
        const a=.4+.6*Math.sin(t*.001+s.a*10);
        ctx.globalAlpha=a;
        ctx.fillStyle='white';
        ctx.beginPath(); ctx.arc(s.x*innerWidth,s.y*innerHeight,s.s,0,Math.PI*2); ctx.fill();
      }
      ctx.globalAlpha=1;
      ctx.fillStyle='#eef4ff';
      ctx.beginPath(); ctx.arc(innerWidth*.18, innerHeight*.16, 34, 0, Math.PI*2); ctx.fill();
      const glow=ctx.createRadialGradient(innerWidth*.18, innerHeight*.16, 34, innerWidth*.18, innerHeight*.16, 110);
      glow.addColorStop(0,'rgba(180,210,255,.2)'); glow.addColorStop(1,'rgba(180,210,255,0)');
      ctx.fillStyle=glow; ctx.beginPath(); ctx.arc(innerWidth*.18, innerHeight*.16, 110, 0, Math.PI*2); ctx.fill();
    }

    function worldToScreen(x,y){
      const sx = innerWidth/2 + (x-player.x)*2.3;
      const sy = innerHeight*0.68 + (y-player.y)*1.55;
      return {x:sx,y:sy};
    }

    function drawGround(t){
      ctx.fillStyle='#16203a';
      ctx.fillRect(0, innerHeight*0.55, innerWidth, innerHeight*0.45);

      ctx.fillStyle='#113763';
      ctx.beginPath();
      ctx.moveTo(0, innerHeight*0.76);
      for(let i=0;i<=innerWidth;i+=24){
        const yy=innerHeight*0.76 + Math.sin(i*.01+t*.0018)*8;
        ctx.lineTo(i,yy);
      }
      ctx.lineTo(innerWidth, innerHeight);
      ctx.lineTo(0, innerHeight);
      ctx.closePath(); ctx.fill();

      for(const p of pools){
        const s=worldToScreen(p.x,p.y);
        const grd=ctx.createRadialGradient(s.x,s.y,1,s.x,s.y,p.r*2.3);
        grd.addColorStop(0,`hsla(${p.h},80%,70%,.55)`); grd.addColorStop(1,'rgba(0,0,0,0)');
        ctx.fillStyle=grd; ctx.beginPath(); ctx.ellipse(s.x,s.y,p.r*2.2,p.r,0,0,Math.PI*2); ctx.fill();
      }

      for(const r of reeds){
        const s=worldToScreen(r.x,r.y);
        const sway=Math.sin(t*.002+r.x)*3;
        ctx.strokeStyle = r.c>.5 ? 'rgba(137,220,255,.7)' : 'rgba(158,126,255,.7)';
        ctx.lineWidth=2;
        ctx.beginPath(); ctx.moveTo(s.x,s.y); ctx.lineTo(s.x+sway,s.y-r.h); ctx.stroke();
      }

      ctx.fillStyle='rgba(110,130,180,.85)';
      for(const st of stones){
        const s=worldToScreen(st.x,st.y);
        ctx.beginPath(); ctx.ellipse(s.x,s.y,st.r*1.6,st.r,0,0,Math.PI*2); ctx.fill();
      }
    }

    function drawBeing(t){
      const s=worldToScreen(being.x,being.y);
      const bob=Math.sin(t*.002)*5;
      const y=s.y+bob;

      const aura=ctx.createRadialGradient(s.x,y,10,s.x,y,70);
      aura.addColorStop(0,'rgba(170,210,255,.25)'); aura.addColorStop(1,'rgba(170,210,255,0)');
      ctx.fillStyle=aura; ctx.beginPath(); ctx.arc(s.x,y,70,0,Math.PI*2); ctx.fill();

      ctx.strokeStyle='rgba(190,210,255,.45)';
      ctx.lineWidth=2;
      ctx.beginPath(); ctx.ellipse(s.x,s.y+36,48,16,0,0,Math.PI*2); ctx.stroke();

      ctx.fillStyle='rgba(122,102,255,.28)';
      ctx.beginPath(); ctx.moveTo(s.x,y-10); ctx.lineTo(s.x-28,y+58); ctx.lineTo(s.x+28,y+58); ctx.closePath(); ctx.fill();

      ctx.fillStyle='rgba(184,212,255,.88)';
      ctx.beginPath(); ctx.arc(s.x,y+8,16,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='rgba(242,247,255,.95)';
      ctx.beginPath(); ctx.arc(s.x,y-18,11,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#20345b';
      ctx.beginPath(); ctx.arc(s.x-4,y-19,1.4,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(s.x+4,y-19,1.4,0,Math.PI*2); ctx.fill();
    }

    function drawPlayer(){
      const px=innerWidth/2, py=innerHeight*0.68;
      ctx.fillStyle='rgba(255,255,255,.9)';
      ctx.beginPath(); ctx.arc(px,py,4,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle='rgba(255,255,255,.25)';
      ctx.lineWidth=2; ctx.beginPath(); ctx.arc(px,py,10,0,Math.PI*2); ctx.stroke();
    }

    function drawPrompt(){
      if(!nearBeing()) return;
      ctx.save();
      ctx.font='600 16px Inter, system-ui, sans-serif';
      ctx.textAlign='center';
      ctx.fillStyle='rgba(255,255,255,.95)';
      ctx.fillText('Press E', innerWidth/2, innerHeight*0.5);
      ctx.restore();
    }

    function loop(t=0){
      update();
      drawSky(t);
      drawGround(t);
      drawBeing(t);
      drawPlayer();
      drawPrompt();
      requestAnimationFrame(loop);
    }
    loop();
  </script>
</body>
</html>
