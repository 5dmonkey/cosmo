<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Studio McCailey</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Inter:wght@400;500;600&family=Parisienne&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="page">
    <section class="intro">
      <p class="eyebrow">A life built<br>around <em>play.</em></p>
      <p class="intro-copy">Immersive experiences for curiosity and connection.</p>
      <p class="signature">by McCailey</p>
    </section>

    <section class="stack">
      <article class="card card-collapsible">
        <button class="card-toggle" type="button" aria-expanded="false">
          <span class="card-title">Be invited into future gatherings</span>
          <span class="card-plus">+</span>
        </button>
        <form name="future-gatherings" method="POST" action="/thank-you-bloom.html" data-netlify="true" netlify-honeypot="bot-field" class="form collapsible" data-success-form hidden>
          <input type="hidden" name="form-name" value="future-gatherings" />
          <input type="hidden" name="subject" value="Future Gatherings Interest" />
          <p class="hidden">
            <label>Don’t fill this out if you're human: <input name="bot-field" /></label>
          </p>
          <label>
            <span>Name</span>
            <input type="text" name="name" required />
          </label>
          <label>
            <span>Email</span>
            <input type="email" name="email" required />
          </label>
          <label>
            <span>City</span>
            <input type="text" name="city" />
          </label>
          <button type="submit">Be invited into future gatherings</button>
          <p class="thank-you" aria-live="polite"></p>
        </form>
      </article>

      <article class="card card-collapsible">
        <button class="card-toggle" type="button" aria-expanded="false">
          <span class="card-title">Explore working together</span>
          <span class="card-plus">+</span>
        </button>
        <form name="work-together" method="POST" action="/thank-you-bloom.html" data-netlify="true" netlify-honeypot="bot-field" class="form collapsible" data-success-form hidden>
          <input type="hidden" name="form-name" value="work-together" />
          <input type="hidden" name="subject" value="Work Together Inquiry" />
          <p class="hidden">
            <label>Don’t fill this out if you're human: <input name="bot-field" /></label>
          </p>
          <label>
            <span>Name</span>
            <input type="text" name="name" required />
          </label>
          <label>
            <span>Email</span>
            <input type="email" name="email" required />
          </label>
          <label>
            <span>What are you envisioning?</span>
            <textarea name="vision" rows="5" required></textarea>
          </label>
          <button type="submit">Explore working together</button>
          <p class="thank-you" aria-live="polite"></p>
        </form>
      </article>
    </section>
    <footer class="footer-note">
      <p>A journal of gatherings, moments, and what’s unfolding.</p>
      <div class="footer-mark">M</div>
    </footer>
  </main>

  <script src="./app.js"></script>
</body>
</html>
