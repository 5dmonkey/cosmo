<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank you — Studio McCailey</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Inter:wght@400;500;600&family=Parisienne&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#f6efe4;--ink:#342b24;--muted:#84766a;--line:rgba(90,74,62,.10);}
    *{box-sizing:border-box} html,body{margin:0;min-height:100%}
    body{font-family:Inter,sans-serif;color:var(--ink);background:radial-gradient(circle at 18% 8%, rgba(255,255,255,0.45), transparent 22%),linear-gradient(180deg,#f8f1e7,var(--bg));display:flex;align-items:center;justify-content:center;padding:24px}
    .card{max-width:560px;width:100%;background:rgba(255,252,247,.5);border:1px solid rgba(90,74,62,.10);border-radius:32px;padding:52px 34px;text-align:left}
    h1{margin:0;font-family:"Cormorant Garamond",serif;font-size:clamp(3rem,9vw,4.8rem);line-height:.96;letter-spacing:-.04em;max-width:8ch}
    p{margin:16px 0 0;max-width:22rem;color:var(--muted);line-height:1.7}
    .sig{margin-top:10px;font-family:"Parisienne",cursive;font-size:1rem;color:#8b7768}
    a{display:inline-block;margin-top:28px;color:var(--ink);text-decoration:none;border:1px solid rgba(90,74,62,.12);border-radius:999px;padding:11px 18px;background:rgba(255,255,255,.24)}
  </style>
</head>
<body>
  <main class="card">
    <h1>Thank you.</h1>
    <p>Your note has been received with care.</p>
    <div class="sig">by McCailey</div>
    <a href="./index.html">Return</a>
  </main>
</body>
</html>
